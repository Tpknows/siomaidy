<!-- Last updated: 2026-07-23 | TP | Change: added Admin/Staff login system (Users tab in sheet), Staff role hides sales figures, all actions logged to ActivityLog tab. Added "Change Password" modal (self-service, needs current password) and "Accounts" panel with Admin-only "Reset Password" per account (no need to know the old password; passwords are hashed and never shown). -->
<!DOCTYPE html>
<html lang="fil">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siomai D' — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1008;
    font-family: 'Inter', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    color: #F3E7C9;
  }

  header {
    background: #2B1610;
    border-bottom: 2px solid #C9A24B;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  header .brand { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; color: #C9A24B; }
  header .sub { font-size: 11px; color: #B79A6E; letter-spacing: 2px; text-transform: uppercase; }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .refresh-btn {
    background: transparent;
    border: 1px solid #C9A24B;
    color: #C9A24B;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .refresh-btn:hover { background: rgba(201,162,75,0.15); }

  .stats-bar {
    display: flex;
    gap: 12px;
    padding: 16px 24px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: #2B1610;
    border: 1px solid #5C4326;
    border-radius: 8px;
    padding: 12px 18px;
    flex: 1;
    min-width: 120px;
  }

  .stat-card .label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #B79A6E;
    margin-bottom: 4px;
  }

  .stat-card .value {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 24px;
    color: #C9A24B;
    font-weight: bold;
  }

  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 0 24px 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #5C4326;
    background: transparent;
    color: #B79A6E;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: #C9A24B;
    border-color: #C9A24B;
    color: #2B1610;
    font-weight: bold;
  }

  .orders-container {
    padding: 0 24px 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #7a6040;
    font-size: 15px;
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  .order-card {
    background: #2B1610;
    border: 1px solid #5C4326;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .order-card:hover { border-color: #C9A24B; }

  .order-card.status-Pending { border-left: 3px solid #E7C877; }
  .order-card.status-Preparing { border-left: 3px solid #5BA4E0; }
  .order-card.status-Ready { border-left: 3px solid #5BCF8A; }
  .order-card.status-Delivered { border-left: 3px solid #8A8A8A; }
  .order-card.status-Cancelled { border-left: 3px solid #e06060; }

  .order-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 14px 16px 10px;
    gap: 10px;
    flex-wrap: wrap;
  }

  .order-id {
    font-size: 11px;
    color: #7a6040;
    letter-spacing: 1px;
    margin-bottom: 2px;
    word-break: break-all;
  }

  .order-name {
    font-size: 17px;
    color: #F3E7C9;
    font-weight: bold;
  }

  .order-meta {
    font-size: 12px;
    color: #B79A6E;
    margin-top: 3px;
  }

  .order-right {
    text-align: right;
    flex-shrink: 0;
  }

  .order-total {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 20px;
    color: #C9A24B;
    font-weight: bold;
  }

  .order-date {
    font-size: 11px;
    color: #7a6040;
    margin-top: 2px;
    white-space: nowrap;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: bold;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .badge-Pending  { background: rgba(231,200,119,0.15); color: #E7C877; }
  .badge-Preparing { background: rgba(91,164,224,0.15); color: #5BA4E0; }
  .badge-Ready    { background: rgba(91,207,138,0.15); color: #5BCF8A; }
  .badge-Delivered { background: rgba(138,138,138,0.15); color: #aaa; }
  .badge-Cancelled { background: rgba(224,96,96,0.15); color: #e06060; }

  .order-items {
    border-top: 1px solid #3A2015;
    padding: 10px 16px;
  }

  .order-item-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 3px 0;
    color: #c4a87a;
  }

  .order-item-row .item-name { color: #F3E7C9; }

  .order-footer {
    border-top: 1px solid #3A2015;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }

  .mode-tag {
    font-size: 12px;
    color: #B79A6E;
  }

  .status-select {
    background: #3A2015;
    border: 1px solid #5C4326;
    border-radius: 6px;
    color: #F3E7C9;
    font-size: 13px;
    padding: 6px 10px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  .status-select:focus { border-color: #C9A24B; }
  .status-select option { background: #2B1610; }

  .delete-btn {
    background: transparent;
    border: 1px solid #5C4326;
    color: #8a6a4a;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .delete-btn:hover { border-color: #e06060; color: #e06060; }

  .note-tag {
    font-size: 12px;
    color: #B79A6E;
    font-style: italic;
    padding: 0 16px 10px;
  }

  .clear-all-btn {
    background: transparent;
    border: 1px solid #5C4326;
    color: #8a6a4a;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    margin-left: auto;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .clear-all-btn:hover { border-color: #e06060; color: #e06060; }

  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: #2B1610;
    border: 1px solid #5C4326;
    border-radius: 10px;
    padding: 30px 26px;
    width: 100%;
    max-width: 340px;
  }

  .login-card .brand { font-family: 'Playfair Display', Georgia, serif; font-size: 24px; color: #C9A24B; }
  .login-card .sub { font-size: 11px; color: #B79A6E; letter-spacing: 2px; text-transform: uppercase; }

  .login-card .field input {
    width: 100%;
    background: #3A2015;
    border: 1px solid #5C4326;
    border-radius: 6px;
    color: #F3E7C9;
    font-family: 'Inter', Helvetica, sans-serif;
    font-size: 16px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-card .field input:focus { border-color: #C9A24B; }
  .login-card .field input::placeholder { color: #7a6040; }

  .login-error {
    font-family: 'Inter', Helvetica, sans-serif;
    font-size: 12px;
    color: #e06060;
    margin-top: 10px;
    min-height: 14px;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  .modal-card {
    background: #2B1610;
    border: 1px solid #C9A24B;
    border-radius: 10px;
    padding: 26px 24px;
    width: 100%;
    max-width: 340px;
    max-height: 85vh;
    overflow-y: auto;
  }

  .modal-card h3 {
    font-family: 'Playfair Display', Georgia, serif;
    color: #C9A24B;
    font-size: 19px;
    margin-bottom: 16px;
    text-align: center;
  }

  .modal-card .field { margin-bottom: 10px; }

  .modal-card .field input {
    width: 100%;
    background: #3A2015;
    border: 1px solid #5C4326;
    border-radius: 6px;
    color: #F3E7C9;
    font-family: 'Inter', Helvetica, sans-serif;
    font-size: 16px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal-card .field input:focus { border-color: #C9A24B; }
  .modal-card .field input::placeholder { color: #7a6040; }

  .modal-error {
    font-family: 'Inter', Helvetica, sans-serif;
    font-size: 12px;
    color: #e06060;
    margin: 4px 0 10px;
    min-height: 14px;
  }

  .modal-success {
    font-family: 'Inter', Helvetica, sans-serif;
    font-size: 12px;
    color: #5BCF8A;
    margin: 4px 0 10px;
    min-height: 14px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }

  .modal-actions button { flex: 1; }

  .modal-cancel-btn {
    background: transparent;
    border: 1px solid #5C4326;
    color: #B79A6E;
    padding: 12px;
    border-radius: 6px;
    font-family: 'Inter', Helvetica, sans-serif;
    font-size: 13px;
    cursor: pointer;
  }
  .modal-cancel-btn:hover { border-color: #C9A24B; color: #C9A24B; }

  .account-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #3A2015;
    border: 1px solid #5C4326;
    border-radius: 8px;
    padding: 10px 14px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .account-row .info { font-family: 'Inter', Helvetica, sans-serif; }
  .account-row .info .uname { color: #F3E7C9; font-size: 14px; font-weight: bold; }
  .account-row .info .role { color: #B79A6E; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

  /* ---- Mobile optimization ---- */
  @media (max-width: 640px) {
    header { padding: 12px 14px; }
    header .brand { font-size: 19px; }

    .header-actions { gap: 8px; width: 100%; }
    .header-actions #userTag,
    .header-actions #syncStatus { flex-basis: 100%; }
    .refresh-btn { flex: 1 1 auto; padding: 9px 12px; font-size: 12.5px; text-align: center; }

    .stats-bar { padding: 12px 14px; gap: 8px; }
    .stat-card { min-width: calc(50% - 4px); padding: 10px 14px; }
    .stat-card .value { font-size: 20px; }

    .filter-bar { padding: 0 14px 12px; }
    .filter-btn { padding: 7px 12px; }
    .clear-all-btn { margin-left: 0; flex-basis: 100%; text-align: center; }

    .orders-container { padding: 0 14px 32px; }
    .order-header { padding: 12px 14px 8px; }
    .order-name { font-size: 16px; }
    .order-right { text-align: left; }

    .order-footer { padding: 10px 14px; }
    .status-select { flex: 1 1 auto; }
  }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="brand" style="text-align:center; margin-bottom:2px;">Siomai D' 🍱</div>
    <div class="sub" style="text-align:center; margin-bottom:20px;">Admin Dashboard</div>
    <div class="field">
      <input type="text" id="loginUsername" placeholder="Username" autocomplete="username">
    </div>
    <div style="height:10px"></div>
    <div class="field">
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="refresh-btn" id="loginBtn" style="width:100%; margin-top:16px; padding:12px;" onclick="attemptLogin()">Log In</button>
  </div>
</div>

<div id="dashboardWrap" style="display:none;">

<header>
  <div>
    <div class="brand">Siomai D' 🍱</div>
    <div class="sub">Admin Dashboard</div>
  </div>
  <div class="header-actions">
    <span id="userTag" style="font-size:12px; color:#B79A6E;"></span>
    <span id="syncStatus" style="font-size:11px; color:#7a6040;"></span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadOrders()">🔄 Refresh</button>
    <button class="refresh-btn" id="accountsBtn" onclick="openAccountsModal()">👥 Accounts</button>
    <button class="refresh-btn" onclick="openChangePasswordModal()">🔑 Change Password</button>
    <button class="refresh-btn" onclick="logout()">Log Out</button>
  </div>
</header>

<div class="modal-overlay" id="accountsModal">
  <div class="modal-card" style="max-width:380px;">
    <h3>Accounts</h3>
    <div id="accountsList" style="display:flex; flex-direction:column; gap:8px; margin-bottom:14px;"></div>
    <div class="modal-actions">
      <button class="modal-cancel-btn" onclick="closeAccountsModal()">Close</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="resetPasswordModal">
  <div class="modal-card">
    <h3 id="rpTitle">Reset Password</h3>
    <div class="field">
      <input type="password" id="rpNewPassword" placeholder="New password" autocomplete="new-password">
    </div>
    <div class="field">
      <input type="password" id="rpConfirmPassword" placeholder="Confirm new password" autocomplete="new-password">
    </div>
    <div class="modal-error" id="rpError"></div>
    <div class="modal-success" id="rpSuccess"></div>
    <div class="modal-actions">
      <button class="modal-cancel-btn" onclick="closeResetPasswordModal()">Cancel</button>
      <button class="refresh-btn" id="rpSubmitBtn" onclick="submitResetPassword()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="changePasswordModal">
  <div class="modal-card">
    <h3>Change Password</h3>
    <div class="field">
      <input type="password" id="cpOldPassword" placeholder="Current password" autocomplete="current-password">
    </div>
    <div class="field">
      <input type="password" id="cpNewPassword" placeholder="New password" autocomplete="new-password">
    </div>
    <div class="field">
      <input type="password" id="cpConfirmPassword" placeholder="Confirm new password" autocomplete="new-password">
    </div>
    <div class="modal-error" id="cpError"></div>
    <div class="modal-success" id="cpSuccess"></div>
    <div class="modal-actions">
      <button class="modal-cancel-btn" onclick="closeChangePasswordModal()">Cancel</button>
      <button class="refresh-btn" id="cpSubmitBtn" onclick="submitChangePassword()">Save</button>
    </div>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-card"><div class="label">Total Orders</div><div class="value" id="statTotal">0</div></div>
  <div class="stat-card"><div class="label">Pending</div><div class="value" id="statPending">0</div></div>
  <div class="stat-card" id="statSalesCard"><div class="label">Today's Sales</div><div class="value" id="statSales">₱0</div></div>
  <div class="stat-card" id="statAvgCard"><div class="label">Avg Order</div><div class="value" id="statAvg">₱0</div></div>
</div>

<div class="filter-bar">
  <span style="font-size:12px; color:#7a6040; margin-right:4px;">Filter:</span>
  <button class="filter-btn active" onclick="setFilter('All')">All</button>
  <button class="filter-btn" onclick="setFilter('Pending')">Pending</button>
  <button class="filter-btn" onclick="setFilter('Preparing')">Preparing</button>
  <button class="filter-btn" onclick="setFilter('Ready')">Ready</button>
  <button class="filter-btn" onclick="setFilter('Delivered')">Delivered</button>
  <button class="filter-btn" onclick="setFilter('Cancelled')">Cancelled</button>
  <button class="clear-all-btn" onclick="clearAll()">🗑 Clear All</button>
</div>

<div class="orders-container" id="ordersContainer"></div>

</div>


<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzB2IajsTUZ6-bWDQjJbu9KLyZ1KrGIj09O7pD7xmYqPFSBj_QhQ092J7thBTocSuo2/exec';

let allOrders = [];
let currentFilter = 'All';
let isLoading = false;
let currentUser = null; // { username, role }

const STATUSES = ['Pending','Preparing','Ready','Delivered','Cancelled'];

function attemptLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  errEl.textContent = '';
  if (!username || !password) {
    errEl.textContent = 'Pakilagay ang username at password.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Nag-che-check...';

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'login', username, password })
  })
    .then(res => res.json())
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'Invalid login');
      currentUser = { username: data.username, role: data.role };
      localStorage.setItem('siomaiAdminUser', JSON.stringify(currentUser));
      enterDashboard();
    })
    .catch(err => {
      errEl.textContent = err.message === 'Invalid username or password'
        ? 'Mali ang username o password.'
        : 'Hindi ma-verify. Subukan ulit.';
    })
    .finally(() => {
      btn.disabled = false;
      btn.textContent = 'Log In';
    });
}

function logout() {
  localStorage.removeItem('siomaiAdminUser');
  currentUser = null;
  document.getElementById('dashboardWrap').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
}

function enterDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboardWrap').style.display = 'block';
  document.getElementById('userTag').textContent = `${currentUser.username} (${currentUser.role})`;

  const isStaff = currentUser.role === 'Staff';
  document.getElementById('statSalesCard').style.display = isStaff ? 'none' : '';
  document.getElementById('statAvgCard').style.display = isStaff ? 'none' : '';
  document.getElementById('accountsBtn').style.display = isStaff ? 'none' : '';

  loadOrders();
}

// Restore session if already logged in on this device
(function checkExistingSession() {
  const saved = localStorage.getItem('siomaiAdminUser');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      enterDashboard();
    } catch (e) {
      localStorage.removeItem('siomaiAdminUser');
    }
  }
})();

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fil-PH', { month:'short', day:'numeric', year:'numeric' })
    + ' ' + d.toLocaleTimeString('fil-PH', { hour:'2-digit', minute:'2-digit' });
}

function isToday(iso) {
  const d = new Date(iso);
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}

function setSyncStatus(text) {
  document.getElementById('syncStatus').textContent = text;
}

function loadOrders() {
  if (isLoading) return;
  isLoading = true;
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  setSyncStatus('Syncing...');

  fetch(SCRIPT_URL + '?action=list')
    .then(res => res.json())
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'Unknown error');
      allOrders = data.orders;
      updateStats();
      renderOrders();
      const now = new Date();
      setSyncStatus('Synced ' + now.toLocaleTimeString('fil-PH', { hour:'2-digit', minute:'2-digit' }));
    })
    .catch(err => {
      console.error(err);
      setSyncStatus('⚠️ Connection error');
    })
    .finally(() => {
      isLoading = false;
      btn.disabled = false;
    });
}

function updateStats() {
  const todayOrders = allOrders.filter(o => isToday(o.date) && o.status !== 'Cancelled');
  const sales = todayOrders.reduce((s,o) => s + o.total, 0);
  const avg = todayOrders.length ? Math.round(sales / todayOrders.length) : 0;
  const pending = allOrders.filter(o => o.status === 'Pending').length;

  document.getElementById('statTotal').textContent = allOrders.length;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statSales').textContent = '₱' + sales;
  document.getElementById('statAvg').textContent = '₱' + avg;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === f);
  });
  renderOrders();
}

function renderOrders() {
  const container = document.getElementById('ordersContainer');
  const filtered = currentFilter === 'All' ? allOrders : allOrders.filter(o => o.status === currentFilter);

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📋</div>Walang orders ${currentFilter !== 'All' ? 'na ' + currentFilter : 'pa'}.</div>`;
    return;
  }

  container.innerHTML = '';
  filtered.forEach(order => {
    const card = document.createElement('div');
    card.className = `order-card status-${order.status}`;
    card.id = 'card-' + order.id;

    const modeIcon = order.mode === 'delivery' ? '🛵 Delivery' : '🏃 Pickup';
    const contact = order.contact ? ` · ${order.contact}` : '';
    const addr = order.mode === 'delivery' ? ` · ${order.address}` : '';

    let itemsHtml = order.items.map(i =>
      `<div class="order-item-row">
        <span class="item-name">${i.name} × ${i.qty}</span>
        <span>₱${i.subtotal}</span>
      </div>`).join('');

    let noteHtml = order.note ? `<div class="note-tag">📝 ${order.note}</div>` : '';

    let statusOptions = STATUSES.map(s =>
      `<option value="${s}" ${s===order.status?'selected':''}>${s}</option>`).join('');

    card.innerHTML = `
      <div class="order-header">
        <div>
          <div class="order-id">${order.id}</div>
          <div class="order-name">${order.name}</div>
          <div class="order-meta">${contact}${addr}</div>
          <span class="badge badge-${order.status}">${order.status}</span>
        </div>
        <div class="order-right">
          <div class="order-total">₱${order.total}</div>
          <div class="order-date">${formatDate(order.date)}</div>
        </div>
      </div>
      <div class="order-items">${itemsHtml}</div>
      ${noteHtml}
      <div class="order-footer">
        <span class="mode-tag">${modeIcon}</span>
        <select class="status-select" onchange="updateStatus('${order.id}', this.value)">
          ${statusOptions}
        </select>
        <button class="delete-btn" onclick="deleteOrder('${order.id}')">✕ Delete</button>
      </div>`;

    container.appendChild(card);
  });
}

function updateStatus(id, newStatus) {
  const idx = allOrders.findIndex(o => o.id === id);
  if (idx === -1) return;
  const oldStatus = allOrders[idx].status;
  allOrders[idx].status = newStatus; // optimistic update
  updateStats();
  renderOrders();

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'updateStatus', id, status: newStatus, username: currentUser.username, role: currentUser.role })
  })
    .then(res => res.json())
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'Unknown error');
    })
    .catch(err => {
      console.error(err);
      alert('Hindi na-save ang status change. Babalik sa dati.');
      allOrders[idx].status = oldStatus;
      updateStats();
      renderOrders();
    });
}

function deleteOrder(id) {
  if (!confirm('I-delete ang order na ito?')) return;
  const backup = allOrders;
  allOrders = allOrders.filter(o => o.id !== id);
  updateStats();
  renderOrders();

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'delete', id, username: currentUser.username, role: currentUser.role })
  })
    .then(res => res.json())
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'Unknown error');
    })
    .catch(err => {
      console.error(err);
      alert('Hindi na-delete sa sheet. Babalik sa dati.');
      allOrders = backup;
      updateStats();
      renderOrders();
    });
}

function clearAll() {
  if (!confirm('I-clear ang LAHAT ng orders? Hindi na ito maibabalik.')) return;

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'clearAll', username: currentUser.username, role: currentUser.role })
  })
    .then(res => res.json())
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'Unknown error');
      loadOrders();
    })
    .catch(err => {
      console.error(err);
      alert('Hindi na-clear. Subukan ulit.');
    });
}

function openChangePasswordModal() {
  document.getElementById('cpOldPassword').value = '';
  document.getElementById('cpNewPassword').value = '';
  document.getElementById('cpConfirmPassword').value = '';
  document.getElementById('cpError').textContent = '';
  document.getElementById('cpSuccess').textContent = '';
  document.getElementById('changePasswordModal').style.display = 'flex';
}

function closeChangePasswordModal() {
  document.getElementById('changePasswordModal').style.display = 'none';
}

function submitChangePassword() {
  const oldPassword = document.getElementById('cpOldPassword').value;
  const newPassword = document.getElementById('cpNewPassword').value;
  const confirmPassword = document.getElementById('cpConfirmPassword').value;
  const errEl = document.getElementById('cpError');
  const okEl = document.getElementById('cpSuccess');
  const btn = document.getElementById('cpSubmitBtn');

  errEl.textContent = '';
  okEl.textContent = '';

  if (!oldPassword || !newPassword || !confirmPassword) {
    errEl.textContent = 'Punan ang lahat ng fields.';
    return;
  }
  if (newPassword.length < 6) {
    errEl.textContent = 'Dapat hindi bababa sa 6 characters ang bagong password.';
    return;
  }
  if (newPassword !== confirmPassword) {
    errEl.textContent = 'Hindi magkatugma ang bagong password at confirm.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sinesave...';

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      action: 'changePassword',
      username: currentUser.username,
      oldPassword,
      newPassword
    })
  })
    .then(res => res.json())
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'Unknown error');
      okEl.textContent = 'Na-update na ang password!';
      document.getElementById('cpOldPassword').value = '';
      document.getElementById('cpNewPassword').value = '';
      document.getElementById('cpConfirmPassword').value = '';
    })
    .catch(err => {
      errEl.textContent = err.message === 'Current password is incorrect'
        ? 'Mali ang current password.'
        : (err.message || 'Hindi na-save. Subukan ulit.');
    })
    .finally(() => {
      btn.disabled = false;
      btn.textContent = 'Save';
    });
}

let resetTargetUsername = null;

function openAccountsModal() {
  document.getElementById('accountsModal').style.display = 'flex';
  loadAccounts();
}

function closeAccountsModal() {
  document.getElementById('accountsModal').style.display = 'none';
}

function loadAccounts() {
  const list = document.getElementById('accountsList');
  list.innerHTML = '<div style="color:#7a6040;font-size:13px;text-align:center;">Loading...</div>';

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'listAccounts', username: currentUser.username })
  })
    .then(res => res.json())
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'Unknown error');
      renderAccounts(data.accounts);
    })
    .catch(err => {
      list.innerHTML = '<div style="color:#e06060;font-size:13px;text-align:center;">' + (err.message || 'Hindi ma-load.') + '</div>';
    });
}

function renderAccounts(accounts) {
  const list = document.getElementById('accountsList');
  if (!accounts.length) {
    list.innerHTML = '<div style="color:#7a6040;font-size:13px;text-align:center;">Walang accounts.</div>';
    return;
  }
  list.innerHTML = '';
  accounts.forEach(acc => {
    const row = document.createElement('div');
    row.className = 'account-row';
    row.innerHTML = `
      <div class="info">
        <div class="uname">${acc.username}</div>
        <div class="role">${acc.role}</div>
      </div>
      <button class="refresh-btn" onclick="openResetPasswordModal('${acc.username}')">Reset Password</button>`;
    list.appendChild(row);
  });
}

function openResetPasswordModal(username) {
  resetTargetUsername = username;
  document.getElementById('rpTitle').textContent = 'Reset Password — ' + username;
  document.getElementById('rpNewPassword').value = '';
  document.getElementById('rpConfirmPassword').value = '';
  document.getElementById('rpError').textContent = '';
  document.getElementById('rpSuccess').textContent = '';
  document.getElementById('resetPasswordModal').style.display = 'flex';
}

function closeResetPasswordModal() {
  document.getElementById('resetPasswordModal').style.display = 'none';
}

function submitResetPassword() {
  const newPassword = document.getElementById('rpNewPassword').value;
  const confirmPassword = document.getElementById('rpConfirmPassword').value;
  const errEl = document.getElementById('rpError');
  const okEl = document.getElementById('rpSuccess');
  const btn = document.getElementById('rpSubmitBtn');

  errEl.textContent = '';
  okEl.textContent = '';

  if (!newPassword || !confirmPassword) {
    errEl.textContent = 'Punan ang lahat ng fields.';
    return;
  }
  if (newPassword.length < 6) {
    errEl.textContent = 'Dapat hindi bababa sa 6 characters ang bagong password.';
    return;
  }
  if (newPassword !== confirmPassword) {
    errEl.textContent = 'Hindi magkatugma ang password at confirm.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sinesave...';

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      action: 'resetPassword',
      username: currentUser.username,
      targetUsername: resetTargetUsername,
      newPassword
    })
  })
    .then(res => res.json())
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'Unknown error');
      okEl.textContent = 'Na-reset na ang password ni ' + resetTargetUsername + '.';
    })
    .catch(err => {
      errEl.textContent = err.message || 'Hindi na-save. Subukan ulit.';
    })
    .finally(() => {
      btn.disabled = false;
      btn.textContent = 'Save';
    });
}

// Auto-refresh every 15 seconds
setInterval(() => { if (currentUser) loadOrders(); }, 15000);
</script>
